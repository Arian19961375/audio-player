<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پخش پیام صوتی</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma, sans-serif;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:360px;
    background:#fff;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    font-size:24px;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:25px;
}

audio{
    width:100%;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">🎧</div>

<h1>پیام صوتی</h1>

<p>برای شنیدن پیام روی دکمه پخش کلیک کنید.</p>

<audio controls preload="metadata">
    <source src="voice.mp3" type="audio/mpeg">
    مرورگر شما از پخش فایل صوتی پشتیبانی نمی‌کند.
</audio>

</div>

</body>
</html>
